source "https://rubygems.org"

# Core Jekyll and Theme dependencies
gem "jekyll", "~> 3.9.0"
gem "minima", "~> 2.0"

# Plugins
group :jekyll_plugins do
  gem "jekyll-feed", "~> 0.6"
  gem "jekyll-seo-tag"
  gem "kramdown-parser-gfm"
end

# Support for Ruby 3.0+ (Fixes exit code 5)
gem "webrick", "~> 1.7"

# Internationalization and Timezone support
gem "tzinfo", "~> 1.2"
gem "tzinfo-data"

# Windows-specific dependencies (Isolated from Linux runner)
platforms :mswin, :mingw, :x64_mingw, :jruby do
  gem "wdm", "~> 0.1.0"
end